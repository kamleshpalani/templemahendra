<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circular background -->
  <circle cx="50" cy="50" r="48" fill="#6b1e1e"/>
  <!-- Gold ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#c9963e" stroke-width="2"/>

  <!-- Gopuram silhouette (stacked tiers) -->
  <g fill="#f5d87c">
    <!-- Base -->
    <rect x="26" y="70" width="48" height="18" rx="2"/>
    <!-- Tier 1 -->
    <rect x="30" y="58" width="40" height="14" rx="2"/>
    <!-- Tier 2 -->
    <rect x="34" y="48" width="32" height="12" rx="2"/>
    <!-- Tier 3 -->
    <rect x="38" y="40" width="24" height="10" rx="2"/>
    <!-- Tier 4 -->
    <rect x="42" y="33" width="16" height="9" rx="2"/>
    <!-- Tier 5 -->
    <rect x="45" y="27" width="10" height="8" rx="2"/>
    <!-- Finial stem -->
    <rect x="48" y="20" width="4" height="9" rx="1"/>
    <!-- Kalasha (top pot) -->
    <ellipse cx="50" cy="19" rx="5" ry="4"/>
    <ellipse cx="50" cy="15" rx="3.5" ry="3"/>
    <!-- Top point -->
    <polygon points="50,8 52.5,13 47.5,13"/>
  </g>

  <!-- OM symbol at base of gopuram -->
  <text x="50" y="83" text-anchor="middle" font-size="10" font-family="serif" fill="#c9963e">🕉</text>
</svg>
