  <rect x="20" y="20" width="472" height="472" rx="60" fill="none" stroke="#c9963e" stroke-width="6"/>
  <!-- Temple Gopuram silhouette -->
  <g fill="#c9963e">
    <!-- Main tower tiers -->
    <rect x="196" y="340" width="120" height="120" rx="4"/>
    <rect x="206" y="300" width="100" height="50" rx="4"/>
    <rect x="216" y="268" width="80" height="40" rx="4"/>
