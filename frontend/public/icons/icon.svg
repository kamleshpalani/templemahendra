    <rect x="234" y="220" width="44" height="28" rx="4"/>
    <rect x="240" y="202" width="32" height="22" rx="4"/>
    <!-- Kalasha (top vessel) -->
    <ellipse cx="256" cy="195" rx="14" ry="10"/>
    <rect x="252" y="178" width="8" height="18" rx="2"/>
    <ellipse cx="256" cy="176" rx="10" ry="7"/>
