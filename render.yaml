# render.yaml — Infrastructure-as-Code for Render.com
# Docs: https://render.com/docs/render-yaml-spec
#
# Deploy steps:
#   1. Push repo to GitHub
#   2. Render dashboard → New → Blueprint → connect repo → this file is auto-detected
#   3. Fill in the env var values marked  sync: false  in the dashboard

services:
  - type: web
    name: temple-mahendra-api
    runtime: docker # PHP has no native Render runtime → Docker
    dockerfilePath: ./Dockerfile

    # Render free tier: auto-sleeps after 15 min inactivity
    # Upgrade to "Starter" ($7/mo) for always-on + persistent disk support
    plan: starter

    # Persistent disk — mounts at /data so the SQLite file survives deploys/restarts
    # NOTE: persistent disks require the "Starter" plan or higher
    disk:
      name: temple-sqlite-data
      mountPath: /data
      sizeGB: 1

    # Render assigns a random port; we tell Apache to bind $PORT
    # (Apache listens on 80 by default; Render proxies 80 → $PORT automatically)
    envVars:
      # ── Database — SQLite (file on persistent disk) ───────────────────────────────
      - key: DB_PATH
        value: /data/temple.sqlite

      # ── CORS — set to your Vercel frontend URL ────────────────────────────────────
      # Example: https://temple-mahendra.vercel.app
      - key: CORS_ORIGIN
        sync: false

      # ── Admin panel credentials ───────────────────────────────────────────────────
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASS_HASH # bcrypt hash — generate with: php -r "echo password_hash('pwd', PASSWORD_BCRYPT);"
        sync: false

      # ── Google Gemini AI (optional — chatbot) ─────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

    # HTTP health probe — Render uses this to confirm the container started
    healthCheckPath: /api/sevas
